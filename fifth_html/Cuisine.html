<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Cuisine</title>
    <style>
      @page { size: auto; margin: 0; }
      html, body { margin: 0; padding: 0; }
      body { font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; font-size: 11pt; line-height: 1.4; padding: 0.6in; }

      p { margin: 0.4em 0; }

      table { border-collapse: collapse; width: 100%; font-size: 10pt; }
      th, td { border: 1px solid #ccc; padding: 6px; }
      th { background: #f5f5f5; }
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  <body>
    <h1>Cuisine</h1>
    <main>
      <p>Cuisine</p><p>A cuisine  is a style of cooking characterized by distinctive ingredients, techniques and dishes, and usually associated with a specific culture or geographic region. Regional food preparation techniques, customs and ingredients combine to enable dishes unique to a region.</p>
    </main>
  </body>
</html>
